name: Sanitized learning candidate
description: Propose a reproducible, public-safe improvement to Live Consultant.
title: "[Learning]: "
labels:
  - learning-candidate
body:
  - type: markdown
    attributes:
      value: |
        This issue is public. Do not paste conversations, customer information, credentials, private URLs, account IDs, local paths, attachments, or confidential business data. Security defects belong in private vulnerability reporting.
  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: 0.2.0
    validations:
      required: true
  - type: input
    id: skill
    attributes:
      label: Affected skill
      placeholder: founder-business-consultant
    validations:
      required: true
  - type: dropdown
    id: failure_kind
    attributes:
      label: Mistake class
      options:
        - Fact or freshness
        - Access claim
        - Arithmetic or economics
        - Reasoning
        - Framework routing
        - Scope or missing context
        - Ideation dilution
        - Execution gate
        - Communication
        - Tooling
    validations:
      required: true
  - type: textarea
    id: mistake
    attributes:
      label: One-sentence sanitized mistake
      description: Paraphrase the observable problem. Do not quote a private conversation.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: State the scoped rule you expected and when it should apply.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal synthetic reproduction
      description: Use invented or public-safe inputs only.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Observable impact
      description: Describe the outcome, not hidden reasoning or a raw transcript.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Public evidence, date, and independence
      description: Link only to public evidence and distinguish independent outcomes from duplicate reports.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Applicability, exceptions, and countercase
    validations:
      required: true
  - type: input
    id: foundation
    attributes:
      label: Foundation anchor
      placeholder: LC-F04
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Public-safety confirmation
      options:
        - label: I included no private, customer, account, credential, raw conversation, attachment, or machine-specific data.
          required: true
        - label: I understand this issue and its Git history are public and may persist after deletion.
          required: true
        - label: I understand this report is a proposal, not an automatically accepted rule or proof of independent evidence.
          required: true
